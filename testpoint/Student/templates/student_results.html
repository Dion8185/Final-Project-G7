{% extends 'student_base.html' %}
{% block title %}Test Results{% endblock %}
{% set sidebar_active = 'results' %}
{% block content %}
<div class="container-fluid animate__animated animate__fadeInUp">
    <h1 class="h3 mb-4 text-gray-800">My Test History</h1>
    <div class="card shadow mb-4">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover" id="resultsTable" width="100%" cellspacing="0">
                    <thead class="bg-primary text-white">
                        <tr>
                            <th>Exam Title</th>
                            <th>Date Completed</th>
                            <th>Score</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Web Development Quiz</td>
                            <td>Oct 20, 2023</td>
                            <td>85/100</td>
                            <td><span class="badge badge-success">Passed</span></td>
                            <td><button class="btn btn-sm btn-primary shadow-sm"><i class="fas fa-eye mr-1"></i> Details</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
