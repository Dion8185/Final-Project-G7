<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Admin - System Control</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin-2/4.1.4/css/sb-admin-2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
<style>
    /* 1. SIDEBAR: Sticky Logic */
    .sidebar { 
        transition: width 0.3s ease-in-out, margin 0.3s ease-in-out !important; 
        position: -webkit-sticky;
        position: sticky;
        top: 0;
        height: 100vh;
        z-index: 1020;
        /* Use auto so you can scroll the sidebar if it has many items, 
           but we hide the scrollbar below for aesthetics */
        overflow-y: auto; 
    }

    /* Hide Sidebar Scrollbar for Chrome, Safari and Opera */
    .sidebar::-webkit-scrollbar {
        display: none;
    }

    /* Hide Sidebar Scrollbar for IE, Edge and Firefox */
    .sidebar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }

    /* 2. NAVBAR: Sticky Logic */
    .topbar {
        position: -webkit-sticky;
        position: sticky;
        top: 0;
        z-index: 1030; /* Higher than sidebar to stay on top */
    }

    /* 3. LAYOUT FIXES: 
       Crucial: 'overflow-x: hidden' on a parent often breaks 'position: sticky'.
       We change it to visible to allow the sticky behavior to trigger. */
    #content-wrapper {
        overflow-x: visible !important;
    }

    #wrapper {
        display: flex;
        align-items: flex-start; /* Prevents the sidebar from stretching to the page height */
    }

    /* 4. CARD ANIMATIONS (Your existing styles) */
    .card { 
        transition: all 0.3s cubic-bezier(.25, .8, .25, 1); 
        border: none; 
    }
</style>
    {% block head %}{% endblock %}
</head>
<body id="page-top">
    <div id="wrapper">
        {% include 'admin_sidebar.html' %}
        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                {% include 'admin_navbar.html' %}
                
                <!-- CONTENT BLOCK: Animated -->
                <div class="container-fluid animate__animated animate__fadeIn">
                    {% block content %}{% endblock %}
                </div>

                <footer class="sticky-footer bg-white">
                    <div class="container my-auto text-center"><span>TestPoint &copy; 2026</span></div>
                </footer>
            </div>
        </div>
    </div>

    <!-- MODAL BLOCK: Outside animation to fix gray-screen freeze -->
    <div id="global-modals">
        <!-- Logout Modal -->
        <div class="modal fade" id="logoutModal" tabindex="-1" role="dialog">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content shadow-lg border-0">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title font-weight-bold text-gray-800"><i class="fas fa-sign-out-alt mr-2 text-danger"></i> Confirm Logout</h5>
                        <button class="close" type="button" data-dismiss="modal"><span>×</span></button>
                    </div>
                    <div class="modal-body text-gray-600">Are you sure you want to log out?</div>
                    <div class="modal-footer border-0 pt-0">
                        <button class="btn btn-outline-secondary btn-sm" type="button" data-dismiss="modal">Cancel</button>
                        <form action="{{ url_for('auth.logout') }}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-danger btn-sm">Logout</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% block modals %}{% endblock %}
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
    <script src="{{ url_for('static', filename='js/paginator.js') }}"></script>
    <script>
        (function ($) {
            "use strict";
            $("#sidebarToggle, #sidebarToggleTop").on('click', function (e) {
                $("body").toggleClass("sidebar-toggled");
                $(".sidebar").toggleClass("toggled");
            });
        })(jQuery);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
