<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}Admin - System Control{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin-2/4.1.4/css/sb-admin-2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
<style>
    /* 1. LAYOUT RESET */
    html, body {
        height: 100%;
        margin: 0;
    }

    #wrapper {
        display: flex;
        min-height: 100vh;
        align-items: stretch;
    }

    /* 2. SIDEBAR: Fixed & Scrollable Logic */
    .sidebar { 
        position: -webkit-sticky;
        position: sticky;
        top: 0;
        height: 100vh;
        z-index: 1020;
        overflow-y: auto; 
        overflow-x: hidden;
        transition: width 0.2s ease-in-out !important; 
    }

    /* Chevron Rotation Logic */
    .dropdown-chevron {
        transition: transform 0.3s ease;
        opacity: 0.5;
    }

    /* When the link is NOT collapsed (meaning it's open) */
    .nav-link:not(.collapsed) .dropdown-chevron {
        transform: rotate(180deg);
        opacity: 1;
    }

    /* Layout adjustment to keep text and chevron apart */
    .nav-link div {
        display: inline-block;
    }

    /* Hide chevron when sidebar is minimized to icons only */
    .sidebar.toggled .dropdown-chevron {
        display: none;
    }

    /* Fix for SB Admin 2 clipping during toggle */
    .sidebar.toggled {
        width: 6.5rem !important;
        overflow: visible; /* Allows tooltips to show correctly */
    }

    /* Custom thin scrollbar for Sidebar */
    .sidebar::-webkit-scrollbar { width: 5px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    /* 3. CONTENT & FOOTER: Sticky Footer Logic */
    #content-wrapper {
        display: flex;
        flex-direction: column;
        width: 100%;
        min-width: 0; /* Prevents flex items from overflowing */
    }

    #content {
        flex: 1 0 auto; /* This makes the content area expand to fill space */
    }

    .sticky-footer {
        flex-shrink: 0; /* Prevents the footer from squishing */
        padding: 2rem 0;
        background-color: white;
    }

    /* 4. NAVBAR: Sticky Logic */
    .topbar {
        position: -webkit-sticky;
        position: sticky;
        top: 0;
        z-index: 1030;
    }

    /* 5. CARD ANIMATIONS */
    .card { 
        transition: all 0.3s cubic-bezier(.25, .8, .25, 1); 
        border: none; 
    }

    /* Sidebar Collapse Item Styling */
    .collapse-item {
        padding: 0.5rem 1rem !important;
        font-size: 0.85rem !important;
        color: #3a3b45 !important;
    }

    .collapse-item:hover {
        background-color: #eaecf4 !important;
        color: #4e73df !important;
        text-decoration: none;
    }

    .collapse-header {
        font-size: 0.7rem !important;
        text-transform: uppercase;
        font-weight: 800;
        color: #b7b9cc;
        padding: 0.5rem 1rem !important;
    }

    /* Ensure sidebar stays scrollable but clean */
    .sidebar {
        max-height: 100vh;
        overflow-y: auto;
    }

    /* Hide arrow icons when sidebar is toggled small */
    .sidebar.toggled .nav-link::after {
        display: none;
    }    
</style>
    {% block head %}{% endblock %}
</head>
<body id="page-top">
    <div id="wrapper">
        {% include 'admin_sidebar.html' %}
        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                {% include 'admin_navbar.html' %}
                
                <!-- CONTENT BLOCK: Animated -->
                <div class="container-fluid animate__animated animate__fadeIn">
                    {% block content %}{% endblock %}
                </div>
            </div>
            <footer class="sticky-footer bg-white border-top">
                <div class="container my-auto text-center">
                    <span class="text-muted small">TestPoint Online Examination System &copy; 2026</span>
                </div>
            </footer>
        </div>
    </div>

    <!-- MODAL BLOCK -->
    <div id="global-modals">
        <!-- Logout Modal -->
        <div class="modal fade" id="logoutModal" tabindex="-1" role="dialog">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content shadow-lg border-0">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title font-weight-bold text-gray-800"><i class="fas fa-sign-out-alt mr-2 text-danger"></i> Confirm Logout</h5>
                        <button class="close" type="button" data-dismiss="modal"><span>×</span></button>
                    </div>
                    <div class="modal-body text-gray-600">Are you sure you want to log out?</div>
                    <div class="modal-footer border-0 pt-0">
                        <button class="btn btn-outline-secondary btn-sm" type="button" data-dismiss="modal">Cancel</button>
                        <form action="{{ url_for('auth.logout') }}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-danger btn-sm">Logout</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% block modals %}{% endblock %}
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
    <script src="{{ url_for('static', filename='js/paginator.js') }}"></script>
    <script>
        (function ($) {
            "use strict";
            $("#sidebarToggle, #sidebarToggleTop").on('click', function (e) {
                $("body").toggleClass("sidebar-toggled");
                $(".sidebar").toggleClass("toggled");
            });
        })(jQuery);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
