<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}Auth{% endblock %}</title>

    <!-- Custom fonts for this template-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles for this template (SB Admin 2 CDN) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin-2/4.1.4/css/sb-admin-2.min.css" rel="stylesheet">

    <style>
        /* Common auth styles */
        .bg-login-exam, .bg-register-image, .bg-register-teacher {
            background-position: center;
            background-size: cover;
        }

        .register-subtitle {
            min-height: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem !important;
        }

        .form-control.is-valid,
        .form-control.is-valid:focus {
            border-color: #28a745 !important;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, .25) !important;
            background-image: none !important;
        }

        .form-control.is-invalid,
        .form-control.is-invalid:focus {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, .25) !important;
            background-image: none !important;
        }

        select.form-control-user {
            border-radius: 10rem;
            height: auto;
            padding: .375rem 1rem;
        }

        .field-feedback {
            font-size: 0.70rem;
            margin-top: 0.2rem;
            padding-left: 1rem;
            min-height: 1rem;
            display: block;
        }

        .field-feedback.valid-msg {
            color: #28a745;
        }

        .field-feedback.invalid-msg {
            color: #dc3545;
        }

        .address-section-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: .5rem;
        }

        .otp-input-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
        }

        .otp-input {
            width: 45px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #d1d3e2;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .otp-input:focus {
            border-color: #4e73df;
            outline: none;
            box-shadow: 0 0 8px rgba(78, 115, 223, 0.25);
        }

        #timer-text {
            font-weight: bold;
            color: #e74a3b;
        }

        .resend-link {
            cursor: pointer;
            text-decoration: none;
        }

        .text-danger-theme {
            color: #e74a3b !important;
        }

        /* Make modal inputs look like the rest of the theme */
        .modal-content {
            border-radius: 15px;
            border: none;
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body class="{% block body_class %}bg-gradient-primary{% endblock %}">

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap core JavaScript-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin-2/4.1.4/js/sb-admin-2.min.js"></script>

    <script>
    window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
            window.location.reload();
        }
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
