<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Verify Reset Code - TestPoint</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"
        type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin-2/4.1.4/css/sb-admin-2.min.css"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('auth.static', filename='img/testpoint.svg') }}">
    <style>
        .otp-input-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
        }

        .otp-input {
            width: 45px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #d1d3e2;
            border-radius: 8px;
            transition: all 0.2s;
            background-color: #fff;
        }

        .otp-input:focus {
            border-color: #4e73df;
            outline: none;
            box-shadow: 0 0 8px rgba(78, 115, 223, 0.25);
        }

        #timer-text {
            font-weight: bold;
            color: #e74a3b;
        }

        .resend-link {
            cursor: pointer;
            text-decoration: none;
        }

        .resend-link.disabled {
            color: #858796 !important;
            pointer-events: none;
            cursor: default;
        }
    </style>
</head>

<body class="bg-gradient-primary">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-6 col-lg-7 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="p-5">
                            <div class="text-center">
                                <div class="mb-4">
                                    <i class="fas fa-envelope-open-text fa-4x text-primary"></i>
                                </div>
                                <h1 class="h4 text-gray-900 mb-2">Verify Your Email</h1>
                                <p class="mb-4">Enter the 6-digit code sent to your email address to complete your
                                    registration.</p>
                            </div>

                            <form action="{{ url_for('auth.verify_reset_otp') }}" method="POST" id="otpForm"
                                class="user">
                                <div class="otp-input-container">
                                    {% for i in range(1, 7) %}
                                    <input type="text" name="pin{{i}}" class="otp-input" maxlength="1"
                                        autocomplete="off" pattern="\d*" inputmode="numeric" required {% if i==1
                                        %}autofocus{% endif %}>
                                    {% endfor %}
                                </div>
                                <div class="text-center mb-4">
                                    <span class="small text-gray-600">Code expires in: </span>
                                    <span id="timer-text">--:--</span>
                                </div>
                                <button type="submit" id="verifyBtn"
                                    class="btn btn-primary btn-user btn-block font-weight-bold shadow-sm">Verify &
                                    Continue</button>
                            </form>

                            <hr>

                            <div class="text-center">
                                <p class="mb-0 small text-gray-600">Didn't receive the code?</p>
                                <a href="javascript:void(0)" id="resendBtn" onclick="resendOtp()"
                                    class="small font-weight-bold text-primary resend-link">Resend New Code</a>
                                <div id="resendMessage" class="mt-2 small font-weight-bold"></div>
                            </div>

                            <div class="text-center mt-3"><a class="small" href="{{ url_for('auth.logout') }}">Return to
                                    Login</a></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function () {
            "use strict";
            const inputs = $('.otp-input');
            const timerDisplay = $('#timer-text');

            // 1. CHECK FOR RELOAD MESSAGE (ATTEMPT COUNT)
            if (sessionStorage.getItem('otp_resent')) {
                const count = sessionStorage.getItem('otp_count');
                $('#resendMessage').html(`<span class="text-success">New code sent! (${count}/5 attempts this hour)</span>`);
                // Clear storage so it doesn't show again on manual refresh
                sessionStorage.removeItem('otp_resent');
                sessionStorage.removeItem('otp_count');
            }

            // 2. PIN NAVIGATION
            inputs.each(function (index) {
                $(this).on('input', function () {
                    if (this.value.length === 1 && index < inputs.length - 1) inputs.eq(index + 1).focus();
                });
                $(this).on('keydown', function (e) {
                    if (e.key === 'Backspace' && this.value.length === 0 && index > 0) inputs.eq(index - 1).focus();
                });
            });

            // 3. BACKEND TIMER LOGIC
            let timeLeft = parseInt("{{ remaining_seconds if remaining_seconds else 0 }}");
            function updateTimer() {
                if (timeLeft <= 0) {
                    timerDisplay.text("Expired").addClass('text-danger');
                    inputs.prop('disabled', true);
                    $('#otpForm').css('opacity', '0.6');
                } else {
                    let m = Math.floor(timeLeft / 60);
                    let s = timeLeft % 60;
                    timerDisplay.text(`${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`);
                    timeLeft--;
                    setTimeout(updateTimer, 1000);
                }
            }
            updateTimer();

            // 4. RESEND LOGIC (Refresh First)
            window.resendOtp = function () {
                const btn = $('#resendBtn');
                btn.addClass('disabled').text("Sending...");

                fetch("{{ url_for('auth.resend_reset_otp') }}", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // Set flags in storage and REFRESH
                            sessionStorage.setItem('otp_resent', 'true');
                            sessionStorage.setItem('otp_count', data.count);
                            window.location.reload();
                        } else {
                            $('#resendMessage').html(`<span class="text-danger">${data.message}</span>`);
                            btn.removeClass('disabled').text("Resend New Code");
                        }
                    })
                    .catch(error => {
                        $('#resendMessage').html(`<span class="text-danger">Network error.</span>`);
                        btn.removeClass('disabled').text("Resend New Code");
                    });
            };
        });
    </script>
</body>

</html>
